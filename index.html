<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG Clan</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* OVERLAY */
.overlay {
    background: rgba(0,0,0,0.85);
    min-height: 100vh;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px;
    border-bottom: 3px solid #facc15;
}

.header img {
    width: 110px;
    border-radius: 50%;
    border: 2px solid #facc15;
}

.header h1 {
    margin-top: 10px;
    color: #facc15;
}

/* CONTAINER */
.container {
    width: 90%;
    margin: auto;
}

/* SECTIONS */
.section {
    margin-top: 40px;
}

.section h2 {
    color: #facc15;
    border-left: 5px solid #facc15;
    padding-left: 10px;
}

/* MEMBERS */
.members {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
}

.member {
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #1e293b;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.5s forwards;
}

.member:hover {
    transform: scale(1.03);
    border-color: #facc15;
}

/* PRO PLAYERS */
.pro {
    border: 2px solid gold;
    box-shadow: 0 0 15px gold;
}

/* TOP BLOCK */
.topPlayers .board {
    font-weight: bold;
}

/* PLAYER TOP */
.top {
    display: flex;
    align-items: center;
    gap: 10px;
}

.avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #facc15;
}

.rank {
    width: 35px;
}

.nickname {
    font-size: 18px;
    font-weight: bold;
}

.uid {
    font-size: 12px;
    color: #94a3b8;
}

/* STATS */
.stats {
    margin-top: 15px;
}

.stat {
    margin-bottom: 10px;
}

.bar {
    height: 8px;
    background: #1e293b;
    border-radius: 5px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: #facc15;
}

/* BOARDS */
.board {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
    border-left: 3px solid #facc15;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    margin-top: 40px;
    background: black;
}

/* ANIMATION */
@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* MOBILE */
@media (max-width: 600px) {
    .top {
        flex-direction: column;
        text-align: center;
    }

    .avatar {
        width: 80px;
        height: 80px;
    }
}
</style>
</head>

<body>

<div class="overlay">

<div class="header">
    <img src="clan-avatar.png">
    <h1>RUS CLAN</h1>
</div>

<div class="container">

<!-- ТОП -->
<div class="section">
    <h2>🏆 Топ игроков</h2>
    <div id="topPlayers" class="topPlayers"></div>
</div>

<!-- УЧАСТНИКИ -->
<div class="section">
    <h2>🎮 Состав клана</h2>
    <div class="members"></div>
</div>

<!-- ОБЪЯВЛЕНИЯ -->
<div class="section">
    <h2>📢 Объявления</h2>
    <div class="board">🔥 Турнир в пятницу 20:00</div>
    <div class="board">⚠️ Ищем новых игроков</div>
</div>

<!-- КАСТОМКИ -->
<div class="section">
    <h2>🗺 Кастомки</h2>
    <div class="board">
        📅 25 марта<br>
        ⏰ 21:00<br>
        🔑 Пароль: 1234
    </div>
</div>

</div>

<div class="footer">
    PUBG Clan Site
</div>

</div>

<script>
const players = [
  {
    uid: "123456789",
    name: "PlayerOne",
    avatar: "user1.jpg",
    rank: "rank.png",
    kd: 4.5,
    wins: 120,
    damage: 850
  },
  {
    uid: "987654321",
    name: "ProKiller",
    avatar: "user2.jpg",
    rank: "rank.png",
    kd: 3.2,
    wins: 80,
    damage: 600
  }
];

// РЕНДЕР ИГРОКОВ
const container = document.querySelector('.members');

players.forEach((p, index) => {
    container.innerHTML += `
    <div class="member ${p.kd > 4 ? 'pro' : ''}" style="animation-delay:${index * 0.1}s">
        <div class="top">
            <img class="rank" src="${p.rank}">
            <img class="avatar" src="${p.avatar}">
            <div>
                <div class="nickname">${p.name}</div>
                <div class="uid">UID: ${p.uid}</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div>KD: ${p.kd}</div>
                <div class="bar"><div class="fill" style="width:${p.kd * 20}%"></div></div>
            </div>

            <div class="stat">
                <div>Победы: ${p.wins}</div>
                <div class="bar"><div class="fill" style="width:${p.wins}%"></div></div>
            </div>

            <div class="stat">
                <div>Урон: ${p.damage}</div>
                <div class="bar"><div class="fill" style="width:${p.damage / 10}%"></div></div>
            </div>
        </div>
    </div>
    `;
});

// ТОП ИГРОКОВ
const topContainer = document.getElementById('topPlayers');

const topPlayers = [...players]
    .sort((a, b) => b.kd - a.kd)
    .slice(0, 3);

topPlayers.forEach((p, i) => {
    topContainer.innerHTML += `
    <div class="board">
        🥇 #${i+1} ${p.name} — KD: ${p.kd}
    </div>
    `;
});
</script>

</body>
</html>
