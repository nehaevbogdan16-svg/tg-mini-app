<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клан PUBG</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px;
    background: #020617;
}

.header img {
    width: 100px;
    border-radius: 50%;
}

.header h1 {
    margin: 10px 0 0;
}

/* CONTAINER */
.container {
    width: 90%;
    margin: auto;
}

/* SECTIONS */
.section {
    margin-top: 30px;
}

.section h2 {
    border-bottom: 2px solid #1e293b;
    padding-bottom: 10px;
}

/* MEMBERS */
.members {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 15px;
}

.member {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.member img.avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
}

.rank {
    width: 30px;
    height: 30px;
}

/* BOARDS */
.board {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    margin-top: 30px;
    background: #020617;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="clan-avatar.png" alt="Аватар клана">
    <h1>CLAN NAME</h1>
</div>

<div class="container">

<!-- MEMBERS -->
<div class="section">
    <h2>Участники</h2>
    <div class="members">

        <div class="member">
            <img class="rank" src="rank.png">
            <img class="avatar" src="user1.jpg">
            <div>
                <div>UID: 123456789</div>
                <div>PlayerOne</div>
            </div>
        </div>

        <div class="member">
            <img class="rank" src="rank.png">
            <img class="avatar" src="user2.jpg">
            <div>
                <div>UID: 987654321</div>
                <div>ProKiller</div>
            </div>
        </div>

    </div>
</div>

<!-- ANNOUNCEMENTS -->
<div class="section">
    <h2>Объявления</h2>

    <div class="board">
        🔥 Тренировка сегодня в 20:00
    </div>

    <div class="board">
        ⚠️ Обновление состава клана
    </div>

</div>

<!-- CUSTOM ROOMS -->
<div class="section">
    <h2>Кастомки</h2>

    <div class="board">
        🗓 25 марта — TDM турнир<br>
        ⏰ 21:00<br>
        🔑 Пароль: 1234
    </div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
    © Клан PUBG Mobile
</div>

</body>
</html>
