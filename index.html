<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG Clan</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.85);
    min-height: 100vh;
}

.header {
    text-align: center;
    padding: 30px;
    border-bottom: 2px solid #facc15;
}

.header img {
    width: 90px;
    border-radius: 50%;
    border: 2px solid #facc15;
}

.header h1 {
    color: #facc15;
}

.container {
    width: 90%;
    margin: auto;
}

.section {
    margin-top: 30px;
}

.section h2 {
    color: #facc15;
    border-left: 4px solid #facc15;
    padding-left: 10px;
}

/* СПИСОК ИГРОКОВ */
.player-list {
    margin-top: 15px;
}

.player {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #020617;
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 8px;
    border: 1px solid #1e293b;
    transition: 0.2s;
}

.player:hover {
    border-color: #facc15;
    transform: scale(1.01);
}

/* ЛЕВАЯ ЧАСТЬ */
.left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.rank {
    width: 25px;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.info {
    display: flex;
    flex-direction: column;
}

.nickname {
    font-weight: bold;
}

.uid {
    font-size: 11px;
    color: #94a3b8;
}

/* ПРАВАЯ ЧАСТЬ (СТАТА) */
.stats {
    display: flex;
    gap: 15px;
    font-size: 13px;
}

/* ПРО ИГРОК */
.pro {
    border: 1px solid gold;
    box-shadow: 0 0 8px gold;
}

/* BOARDS */
.board {
    background: #020617;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
    border-left: 3px solid #facc15;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    margin-top: 30px;
    background: black;
}

/* MOBILE */
@media (max-width: 600px) {
    .stats {
        flex-direction: column;
        gap: 3px;
        text-align: right;
    }
}
</style>
</head>

<body>

<div class="overlay">

<div class="header">
    <img src="clan-avatar.png">
    <h1>RUS CLAN</h1>
</div>

<div class="container">

<!-- ТОП -->
<div class="section">
    <h2>🏆 Топ игроков</h2>
    <div id="topPlayers"></div>
</div>

<!-- УЧАСТНИКИ -->
<div class="section">
    <h2>🎮 Участники</h2>
    <div class="player-list" id="players"></div>
</div>

<!-- ОБЪЯВЛЕНИЯ -->
<div class="section">
    <h2>📢 Объявления</h2>
    <div class="board">🔥 Турнир в пятницу 20:00</div>
    <div class="board">⚠️ Ищем новых игроков</div>
</div>

<!-- КАСТОМКИ -->
<div class="section">
    <h2>🗺 Кастомки</h2>
    <div class="board">
        📅 25 марта<br>
        ⏰ 21:00<br>
        🔑 Пароль: 1234
    </div>
</div>

</div>

<div class="footer">
    PUBG Clan Site
</div>

</div>

<script>
const players = [
  { uid: "123456789", name: "PlayerOne", avatar: "user1.jpg", rank: "rank.png", kd: 4.5, wins: 120 },
  { uid: "987654321", name: "ProKiller", avatar: "user2.jpg", rank: "rank.png", kd: 3.2, wins: 80 }
];

// СПИСОК
const container = document.getElementById('players');

players.forEach(p => {
    container.innerHTML += `
    <div class="player ${p.kd > 4 ? 'pro' : ''}">
        <div class="left">
            <img class="rank" src="${p.rank}">
            <img class="avatar" src="${p.avatar}">
            <div class="info">
                <div class="nickname">${p.name}</div>
                <div class="uid">UID: ${p.uid}</div>
            </div>
        </div>

        <div class="stats">
            <div>KD: ${p.kd}</div>
            <div>Wins: ${p.wins}</div>
        </div>
    </div>
    `;
});

// ТОП
const top = [...players].sort((a,b)=>b.kd-a.kd).slice(0,3);
const topContainer = document.getElementById('topPlayers');

top.forEach((p,i)=>{
    topContainer.innerHTML += `
    <div class="board">
        🥇 #${i+1} ${p.name} — KD: ${p.kd}
    </div>
    `;
});
</script>

</body>
</html>
